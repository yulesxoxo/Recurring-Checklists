exclude: ^worker-configuration\.d\.ts$

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v3.2.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
  - repo: local
    hooks:
      - id: pnpm-format
        name: pnpm format
        entry: pnpm format
        language: system
        pass_filenames: false
      - id: pnpm-eslint:fix
        name: pnpm eslint:fix
        entry: pnpm eslint:fix
        language: system
        pass_filenames: false
      - id: pnpm-check
        name: pnpm check
        entry: pnpm check
        language: system
        pass_filenames: false
